<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #333;
    }

    .container {
      width: 80%;
      margin: 0 auto;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    .header {
      background-color: #f4f4f4;
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    .content {
      padding: 20px 0;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.8em;
      text-align: center;
      color: #777;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin-bottom: 10px;
    }

    strong {
      color: #000;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h2>New Inquiry for Kreative Robotics</h2>
    </div>
    <div class="content">
      <p>You have received a new message from your contact form:</p>
      <ul>
        <li><strong>Name:</strong> {{name}}</li>
        <li><strong>Email:</strong> {{email}}</li>
        <li><strong>Phone:</strong> {{phone}}</li>
        <li><strong>Message:</strong><br />{{message}}</li>
      </ul>
    </div>
    <div class="footer">
      <p>&copy; Kreative Robotics. All rights reserved.</p>
    </div>
  </div>
</body>

</html>
